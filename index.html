<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Anime Tracker</h1>
  <div class="topbar-actions">
    <span id="user-email"></span>
    <button id="logout-btn" class="hidden">Logout</button>
  </div>
</header>

<main class="container">

<section id="auth-section" class="card">
  <h2>Login / Sign Up</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="auth-buttons">
    <button id="login-btn">Login</button>
    <button id="signup-btn" class="secondary-btn">Sign Up</button>
  </div>

  <p id="auth-message"></p>
</section>

<section id="app-section" class="hidden">
  <div class="card">
    <h2>Search Anime</h2>
    <p class="muted">Search AniList and add shows to your personal tracking list.</p>
    <div class="search-row">
      <input id="search-input" placeholder="Search anime...">
      <button id="search-btn">Search</button>
    </div>
    <div id="search-results" class="grid"></div>
  </div>

  <div class="card">
    <h2>My List</h2>
    <div class="stats-row">
      <div class="stat-box"><span class="stat-label">Total</span><span class="stat-value" id="stat-total">0</span></div>
      <div class="stat-box"><span class="stat-label">Watching</span><span class="stat-value" id="stat-watching">0</span></div>
      <div class="stat-box"><span class="stat-label">Completed</span><span class="stat-value" id="stat-completed">0</span></div>
      <div class="stat-box"><span class="stat-label">Episodes Watched</span><span class="stat-value" id="stat-progress">0</span></div>
    </div>
    <div class="search-row">
      <select id="status-filter">
        <option value="All">All statuses</option>
        <option value="Planning">Planning</option>
        <option value="Watching">Watching</option>
        <option value="Completed">Completed</option>
      </select>
    </div>
    <div id="my-list" class="grid"></div>
  </div>
</section>

</main>

<script type="module" src="app.js"></script>
</body>
</html>
